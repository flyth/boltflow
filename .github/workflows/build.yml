name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build (arm64, amd64, universal)
        run: |
          CGO_ENABLED=1 GOARCH=arm64 go build -o boltflow-macos-arm64 .
          CGO_ENABLED=1 GOARCH=amd64 go build -o boltflow-macos-amd64 .
          lipo -create -output boltflow-macos-universal boltflow-macos-arm64 boltflow-macos-amd64
      - name: Vet
        run: go vet ./...
      - uses: actions/upload-artifact@v4
        with:
          name: boltflow-macos
          path: boltflow-macos-*

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install libudev (hidapi dependency)
        run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - name: Build
        run: CGO_ENABLED=1 go build -o boltflow-linux-amd64 .
      - name: Vet
        run: go vet ./...
      - uses: actions/upload-artifact@v4
        with:
          name: boltflow-linux
          path: boltflow-linux-amd64

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [macos, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: boltflow-*
